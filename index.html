<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音MADジェネレーター (オクターブ維持モード搭載版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid #007acc;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .section {
            margin-bottom: 25px;
            padding: 15px;
            background-color: #3d3d3d;
            border-radius: 6px;
        }
        .section h2 {
            margin-top: 0;
            font-size: 1.2em;
            color: #4daafc;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        input[type="file"], select, input[type="number"] {
            display: block;
            margin-bottom: 10px;
            width: 100%;
            padding: 8px;
            background-color: #1e1e1e;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .input-group div {
            flex: 1;
        }
        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #005f9e;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .preview-btn {
            background-color: #28a745;
            margin-bottom: 10px;
        }
        .preview-btn:hover {
            background-color: #218838;
        }
        #status {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: #ffcc00;
            word-break: break-all;
            padding: 10px;
            background-color: #333;
            border-radius: 4px;
        }
        #progressContainer {
            width: 100%;
            background-color: #1e1e1e;
            border: 1px solid #555;
            border-radius: 4px;
            margin-top: 15px;
            height: 24px;
            display: none;
            position: relative;
            overflow: hidden;
        }
        #progressBar {
            width: 0%;
            height: 100%;
            background-color: #4daafc;
            transition: width 0.1s linear;
        }
        #progressText {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85em;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }
        #downloadArea {
            margin-top: 20px;
            display: none;
        }
        #downloadArea a {
            display: block;
            text-align: center;
            background-color: #e51400;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        #downloadArea a:hover {
            background-color: #b30f00;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>音MADジェネレーター</h1>

    <div class="section">
        <h2>1. 音声のアップロード</h2>
        <label>素材となる音声ファイル (MP3 / WAV)</label>
        <input type="file" id="audioUpload" accept="audio/mp3, audio/wav, audio/mpeg">
        
        <div class="input-group">
            <div>
                <label>開始時間 (秒)</label>
                <input type="number" id="trimStart" value="0" min="0" step="0.01">
            </div>
            <div>
                <label>終了時間 (秒)</label>
                <input type="number" id="trimEnd" value="1" min="0.01" step="0.01">
            </div>
        </div>
        
        <label>音声の元の高さ（基準音）</label>
        <select id="baseNote">
            <option value="48">C3 (低いド / 男性ボーカル等)</option>
            <option value="60" selected>C4 (真ん中のド / 標準)</option>
            <option value="72">C5 (高いド / 女性ボーカル等)</option>
        </select>
        <button class="preview-btn" id="previewBtn" disabled>範囲をプレビュー</button>
    </div>

    <div class="section">
        <h2>2. MIDIのアップロードと設定</h2>
        <label>メロディとなるMIDIファイル</label>
        <input type="file" id="midiUpload" accept=".mid, .midi">
        
        <label style="margin-top: 15px;">全体のピッチ調整 (半音単位)</label>
        <input type="number" id="pitchShift" value="0" min="-24" max="24" step="1">
        
        <label style="margin-top: 15px; color: #4daafc; font-weight: bold;">合成モードを選択</label>
        <select id="synthMode">
            <option value="continuous">長時間連続モード (メロディ通りにそのまま変速)</option>
            <option value="continuous_keep_octave" selected>長時間連続・オクターブ維持モード (声の高さを極力保つ)</option>
            <option value="single">単音MADモード (メロディ通りにそのまま変速)</option>
            <option value="single_keep_octave">単音MAD・オクターブ維持モード (声の高さを極力保つ)</option>
        </select>
    </div>

    <div class="section">
        <h2>3. MP3生成</h2>
        <button id="generateBtn" disabled>MP3を生成する</button>
        
        <div id="progressContainer">
            <div id="progressBar"></div>
            <div id="progressText">0%</div>
        </div>
        <div id="status">待機中</div>
    </div>

    <div id="downloadArea">
        <a id="downloadLink" href="#" download="otomad_output.mp3">MP3形式でダウンロード</a>
    </div>
</div>

<script>
    // --- Web Workerのコード（裏側の独立したスレッドで動く処理） ---
    const workerCode = `
        // MP3変換用のライブラリを直接インポート
        importScripts('https://cdn.jsdelivr.net/npm/lamejs@1.2.1/lame.min.js');

        self.onmessage = function(e) {
            try {
                const { inL, inR, validNotes, sampleRate, totalSamples, baseMidi, pitchShift, mode } = e.data;
                const outL = new Float32Array(totalSamples);
                const outR = new Float32Array(totalSamples);
                const sourceLength = inL.length;
                let totalNotes = validNotes.length;

                let processedNotes = 0;
                let startTime = Date.now();

                // モードの判定
                const isContinuous = mode.startsWith('continuous');
                const keepOctave = mode.includes('keep_octave');

                if (isContinuous) {
                    // 長時間MP3を連続で読み込みながらピッチを変更するモード
                    let monoNotes = [];
                    let currentEnd = 0;
                    validNotes.sort((a,b) => a.time - b.time);
                    for(let i=0; i<totalNotes; i++) {
                        if(validNotes[i].time >= currentEnd) {
                            monoNotes.push(validNotes[i]);
                            currentEnd = validNotes[i].time + validNotes[i].duration;
                        }
                    }
                    
                    const monoTotal = monoNotes.length;
                    let srcPos = 0;
                    let lastNoteEndSample = 0;

                    for (let i = 0; i < monoTotal; i++) {
                        const note = monoNotes[i];
                        const startSample = Math.floor(note.time * sampleRate);
                        const durationSamples = Math.floor(note.duration * sampleRate);
                        
                        if (startSample > lastNoteEndSample) {
                            srcPos += (startSample - lastNoteEndSample);
                        }
                        
                        let shiftedMidi = note.midi + pitchShift;
                        shiftedMidi = Math.max(0, Math.min(127, shiftedMidi));
                        let semitoneDiff = shiftedMidi - baseMidi;

                        // ★ オクターブ維持の計算 ★
                        if (keepOctave) {
                            semitoneDiff = semitoneDiff % 12; // 12半音(1オクターブ)で割った余りを出す
                            // 元の高さから -5 ～ +6 半音の範囲に収める
                            if (semitoneDiff > 6) {
                                semitoneDiff -= 12;
                            } else if (semitoneDiff < -5) {
                                semitoneDiff += 12;
                            }
                        }
                        
                        const playbackRate = Math.pow(2, semitoneDiff / 12.0);
                        
                        let outIdx = startSample;
                        
                        for (let j = 0; j < durationSamples; j++) {
                            if (outIdx >= totalSamples || srcPos >= sourceLength - 1) break;
                            
                            const idxFloor = Math.floor(srcPos);
                            const frac = srcPos - idxFloor;
                            const valL = inL[idxFloor] * (1 - frac) + inL[idxFloor + 1] * frac;
                            const valR = inR ? (inR[idxFloor] * (1 - frac) + inR[idxFloor + 1] * frac) : valL;
                            
                            let env = 1.0;
                            if (j < 441) env = j / 441;
                            else if (j > durationSamples - 441) env = (durationSamples - j) / 441;
                            
                            const vol = note.velocity * 0.8 * env;
                            outL[outIdx] += valL * vol;
                            outR[outIdx] += valR * vol;
                            
                            outIdx++;
                            srcPos += playbackRate;
                        }
                        lastNoteEndSample = startSample + durationSamples;
                        
                        processedNotes++;
                        if (processedNotes % 20 === 0) {
                            self.postMessage({ type: 'progress', processed: processedNotes, total: monoTotal, elapsed: Date.now() - startTime });
                        }
                    }

                } else {
                    // 単音MADモード（毎回最初から再生）
                    for (let i = 0; i < totalNotes; i++) {
                        const note = validNotes[i];
                        let shiftedMidi = note.midi + pitchShift;
                        shiftedMidi = Math.max(0, Math.min(127, shiftedMidi));
                        let semitoneDiff = shiftedMidi - baseMidi;

                        // ★ オクターブ維持の計算 ★
                        if (keepOctave) {
                            semitoneDiff = semitoneDiff % 12;
                            if (semitoneDiff > 6) {
                                semitoneDiff -= 12;
                            } else if (semitoneDiff < -5) {
                                semitoneDiff += 12;
                            }
                        }

                        const playbackRate = Math.pow(2, semitoneDiff / 12.0);

                        const startSample = Math.floor(note.time * sampleRate);
                        const durationSamples = Math.floor(note.duration * sampleRate);
                        const attackSamples = Math.floor(0.01 * sampleRate);
                        const releaseSamples = Math.floor(0.05 * sampleRate);

                        let outIdx = startSample;
                        let srcPos = 0; 

                        for (let j = 0; j < durationSamples + releaseSamples; j++) {
                            if (outIdx >= totalSamples) break;
                            if (srcPos >= sourceLength - 1) break;

                            const idxFloor = Math.floor(srcPos);
                            const frac = srcPos - idxFloor;
                            const valL = inL[idxFloor] * (1 - frac) + inL[idxFloor + 1] * frac;
                            const valR = inR ? (inR[idxFloor] * (1 - frac) + inR[idxFloor + 1] * frac) : valL;

                            let env = 1.0;
                            if (j < attackSamples) env = j / attackSamples;
                            else if (j > durationSamples) env = 1.0 - ((j - durationSamples) / releaseSamples);
                            if (env < 0) env = 0;

                            const vol = note.velocity * 0.5 * env;
                            outL[outIdx] += valL * vol;
                            outR[outIdx] += valR * vol;

                            outIdx++;
                            srcPos += playbackRate;
                        }
                        processedNotes++;
                        if (processedNotes % 100 === 0) {
                            self.postMessage({ type: 'progress', processed: processedNotes, total: totalNotes, elapsed: Date.now() - startTime });
                        }
                    }
                }

                // 2. MP3ファイルへのエンコード
                self.postMessage({ type: 'status', message: '音量調整とMP3への変換を行っています...(数十秒かかる場合があります)' });
                
                let maxAmp = 0;
                for (let i = 0; i < totalSamples; i++) {
                    if (Math.abs(outL[i]) > maxAmp) maxAmp = Math.abs(outL[i]);
                    if (Math.abs(outR[i]) > maxAmp) maxAmp = Math.abs(outR[i]);
                }

                const volumeBoost = maxAmp > 0 ? (0.95 / maxAmp) : 1;
                
                const int16L = new Int16Array(totalSamples);
                const int16R = new Int16Array(totalSamples);
                for (let i = 0; i < totalSamples; i++) {
                    let sL = outL[i] * volumeBoost;
                    let sR = outR[i] * volumeBoost;
                    sL = Math.max(-1, Math.min(1, sL));
                    sR = Math.max(-1, Math.min(1, sR));
                    int16L[i] = sL < 0 ? sL * 0x8000 : sL * 0x7FFF;
                    int16R[i] = sR < 0 ? sR * 0x8000 : sR * 0x7FFF;
                }

                const mp3encoder = new lamejs.Mp3Encoder(2, sampleRate, 192);
                const mp3Data = [];
                const sampleBlockSize = 1152; 

                for (let i = 0; i < totalSamples; i += sampleBlockSize) {
                    const end = Math.min(i + sampleBlockSize, totalSamples);
                    const length = end - i;
                    const leftChunk = new Int16Array(length);
                    const rightChunk = new Int16Array(length);
                    for(let j = 0; j < length; j++) {
                        leftChunk[j] = int16L[i+j];
                        rightChunk[j] = int16R[i+j];
                    }
                    const mp3buf = mp3encoder.encodeBuffer(leftChunk, rightChunk);
                    if (mp3buf.length > 0) {
                        mp3Data.push(new Int8Array(mp3buf));
                    }
                }
                
                const mp3buf = mp3encoder.flush();
                if (mp3buf.length > 0) {
                    mp3Data.push(new Int8Array(mp3buf));
                }

                self.postMessage({ type: 'done', mp3Data: mp3Data });

            } catch (error) {
                self.postMessage({ type: 'error', message: error.message });
            }
        };
    `;

    const blob = new Blob([workerCode], { type: 'application/javascript' });
    const workerUrl = URL.createObjectURL(blob);
    let renderWorker = null;

    // --- メイン画面の処理 ---
    let originalAudioBuffer = null;
    let midiData = null;
    let previewPlayer = null;

    const audioUpload = document.getElementById('audioUpload');
    const midiUpload = document.getElementById('midiUpload');
    const trimStart = document.getElementById('trimStart');
    const trimEnd = document.getElementById('trimEnd');
    const baseNoteSelect = document.getElementById('baseNote');
    const pitchShiftInput = document.getElementById('pitchShift');
    const synthModeSelect = document.getElementById('synthMode');
    const previewBtn = document.getElementById('previewBtn');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const downloadArea = document.getElementById('downloadArea');
    const downloadLink = document.getElementById('downloadLink');

    audioUpload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        statusDiv.textContent = '音声を読み込んでいます...';
        const arrayBuffer = await file.arrayBuffer();
        const audioContext = Tone.getContext().rawContext;
        try {
            const decodedBuffer = await audioContext.decodeAudioData(arrayBuffer);
            originalAudioBuffer = new Tone.ToneAudioBuffer(decodedBuffer);
            trimEnd.value = originalAudioBuffer.duration.toFixed(2);
            statusDiv.textContent = '音声の読み込みが完了しました。';
            checkReady();
        } catch (err) {
            statusDiv.textContent = '音声の読み込みに失敗しました。';
            console.error(err);
        }
    });

    midiUpload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        statusDiv.textContent = 'MIDIを読み込んでいます...';
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                midiData = new Midi(e.target.result);
                statusDiv.textContent = 'MIDIの読み込みが完了しました。';
                checkReady();
            } catch (err) {
                statusDiv.textContent = 'MIDIの解析に失敗しました。';
                console.error(err);
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function checkReady() {
        previewBtn.disabled = !originalAudioBuffer;
        generateBtn.disabled = !(originalAudioBuffer && midiData);
    }

    function getSlicedBuffer() {
        const start = parseFloat(trimStart.value);
        let end = parseFloat(trimEnd.value);
        if (start >= end) end = start + 0.1;
        return originalAudioBuffer.slice(start, end).get();
    }

    previewBtn.addEventListener('click', async () => {
        await Tone.start();
        if (previewPlayer) {
            previewPlayer.stop();
            previewPlayer.dispose();
        }
        const sliced = originalAudioBuffer.slice(parseFloat(trimStart.value), parseFloat(trimEnd.value));
        previewPlayer = new Tone.Player(sliced).toDestination();
        previewPlayer.start();
    });

    generateBtn.addEventListener('click', async () => {
        generateBtn.disabled = true;
        downloadArea.style.display = 'none';
        progressContainer.style.display = 'block';
        progressBar.style.width = '0%';
        progressText.textContent = '準備中...';
        
        try {
            let maxDuration = 0;
            let validNotes = [];

            midiData.tracks.forEach(track => {
                track.notes.forEach(note => {
                    const time = parseFloat(note.time) || 0;
                    const duration = parseFloat(note.duration) || 0.1;
                    if (time >= 0 && duration > 0) {
                        validNotes.push({
                            time: time,
                            duration: duration,
                            midi: note.midi,
                            velocity: note.velocity || 0.8
                        });
                        if (time + duration > maxDuration) {
                            maxDuration = time + duration;
                        }
                    }
                });
            });

            if (validNotes.length === 0) throw new Error("MIDIファイルに有効な音符が含まれていません。");

            const MAX_SECONDS = 600;
            if (maxDuration > MAX_SECONDS) maxDuration = MAX_SECONDS;
            
            const renderDuration = maxDuration + 2.0;
            const sampleRate = 44100;
            const totalSamples = Math.ceil(renderDuration * sampleRate);
            
            const sourceBuffer = getSlicedBuffer();
            const inL = sourceBuffer.getChannelData(0);
            const inR = sourceBuffer.numberOfChannels > 1 ? sourceBuffer.getChannelData(1) : null;

            const baseMidi = parseInt(baseNoteSelect.value);
            const pitchShift = parseInt(pitchShiftInput.value) || 0;
            const selectedMode = synthModeSelect.value;

            statusDiv.textContent = 'バックグラウンドで処理を開始しました。';

            if (renderWorker) renderWorker.terminate();
            renderWorker = new Worker(workerUrl);

            renderWorker.onmessage = function(e) {
                const data = e.data;

                if (data.type === 'progress') {
                    const percent = Math.floor((data.processed / data.total) * 80);
                    const elapsedSec = data.elapsed / 1000;
                    
                    let remainingSec = 0;
                    if (elapsedSec > 1 && data.processed > 0) {
                        const rate = data.processed / elapsedSec;
                        remainingSec = Math.max(0, Math.ceil((data.total - data.processed) / rate));
                    }

                    progressBar.style.width = percent + '%';
                    progressText.textContent = percent + '% (残り約 ' + remainingSec + ' 秒)';
                } 
                else if (data.type === 'status') {
                    statusDiv.textContent = data.message;
                    progressBar.style.width = '85%';
                    progressText.textContent = '85% (MP3変換中...)';
                }
                else if (data.type === 'done') {
                    progressBar.style.width = '100%';
                    progressText.textContent = '完了!';
                    
                    const blob = new Blob(data.mp3Data, { type: 'audio/mp3' });
                    const finalUrl = URL.createObjectURL(blob);
                    
                    downloadLink.href = finalUrl;
                    downloadArea.style.display = 'block';
                    statusDiv.textContent = 'MP3の生成が完了しました！下のボタンから保存してください。';
                    generateBtn.disabled = false;
                    renderWorker.terminate();
                }
                else if (data.type === 'error') {
                    throw new Error(data.message);
                }
            };

            renderWorker.postMessage({
                inL: inL,
                inR: inR,
                validNotes: validNotes,
                sampleRate: sampleRate,
                totalSamples: totalSamples,
                baseMidi: baseMidi,
                pitchShift: pitchShift,
                mode: selectedMode
            });

        } catch (err) {
            statusDiv.textContent = '生成中にエラーが発生しました: ' + err.message;
            console.error(err);
            generateBtn.disabled = false;
            if (renderWorker) renderWorker.terminate();
        }
    });
</script>

</body>
</html>
