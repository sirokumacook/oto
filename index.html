<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音MADジェネレーター</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid #007acc;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .section {
            margin-bottom: 25px;
            padding: 15px;
            background-color: #3d3d3d;
            border-radius: 6px;
        }
        .section h2 {
            margin-top: 0;
            font-size: 1.2em;
            color: #4daafc;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        input[type="file"], select, input[type="number"] {
            display: block;
            margin-bottom: 10px;
            width: 100%;
            padding: 8px;
            background-color: #1e1e1e;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .input-group div {
            flex: 1;
        }
        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #005f9e;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .preview-btn {
            background-color: #28a745;
            margin-bottom: 10px;
        }
        .preview-btn:hover {
            background-color: #218838;
        }
        #status {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: #ffcc00;
            word-break: break-all;
            padding: 10px;
            background-color: #333;
            border-radius: 4px;
        }
        #downloadArea {
            margin-top: 20px;
            display: none;
        }
        #downloadArea a {
            display: block;
            text-align: center;
            background-color: #e51400;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        #downloadArea a:hover {
            background-color: #b30f00;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>音MADジェネレーター</h1>

    <div class="section">
        <h2>1. 音声のアップロードと切り抜き</h2>
        <label>素材となる音声ファイル (MP3 / WAV)</label>
        <input type="file" id="audioUpload" accept="audio/mp3, audio/wav, audio/mpeg">
        
        <div class="input-group">
            <div>
                <label>開始時間 (秒)</label>
                <input type="number" id="trimStart" value="0" min="0" step="0.01">
            </div>
            <div>
                <label>終了時間 (秒)</label>
                <input type="number" id="trimEnd" value="1" min="0.01" step="0.01">
            </div>
        </div>
        
        <label>切り抜いた音声の元の高さ（基準音）</label>
        <select id="baseNote">
            <option value="C3">C3 (低いド / 男性ボーカル等)</option>
            <option value="C4" selected>C4 (真ん中のド / 標準)</option>
            <option value="C5">C5 (高いド / 女性ボーカル等)</option>
            <option value="G3">G3 (ソ)</option>
            <option value="G4">G4 (高いソ)</option>
        </select>
        
        <button class="preview-btn" id="previewBtn" disabled>切り抜いた音声をプレビュー</button>
    </div>

    <div class="section">
        <h2>2. MIDIのアップロードと設定</h2>
        <label>メロディとなるMIDIファイル</label>
        <input type="file" id="midiUpload" accept=".mid, .midi">
        
        <label style="margin-top: 15px;">全体のピッチ調整 (半音単位)</label>
        <input type="number" id="pitchShift" value="0" min="-24" max="24" step="1">
        <p style="font-size: 0.8em; color: #bbb; margin-top: 0;">※ 0 でそのまま。+12 で1オクターブ高く、-12 で1オクターブ低く生成されます。</p>
    </div>

    <div class="section">
        <h2>3. 生成</h2>
        <button id="generateBtn" disabled>音声を生成する</button>
        <div id="status">待機中</div>
    </div>

    <div id="downloadArea">
        <a id="downloadLink" href="#" download="otomad_output.wav">WAV形式でダウンロード</a>
    </div>
</div>

<script>
    let originalAudioBuffer = null;
    let midiData = null;
    let previewPlayer = null;

    const audioUpload = document.getElementById('audioUpload');
    const midiUpload = document.getElementById('midiUpload');
    const trimStart = document.getElementById('trimStart');
    const trimEnd = document.getElementById('trimEnd');
    const baseNoteSelect = document.getElementById('baseNote');
    const pitchShiftInput = document.getElementById('pitchShift');
    const previewBtn = document.getElementById('previewBtn');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');
    const downloadArea = document.getElementById('downloadArea');
    const downloadLink = document.getElementById('downloadLink');

    audioUpload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        statusDiv.textContent = '音声を読み込んでいます...';
        const arrayBuffer = await file.arrayBuffer();
        const audioContext = Tone.getContext().rawContext;
        
        try {
            const decodedBuffer = await audioContext.decodeAudioData(arrayBuffer);
            originalAudioBuffer = new Tone.ToneAudioBuffer(decodedBuffer);
            trimEnd.value = originalAudioBuffer.duration.toFixed(2);
            statusDiv.textContent = '音声の読み込みが完了しました。';
            checkReady();
        } catch (err) {
            statusDiv.textContent = '音声の読み込みに失敗しました。';
            console.error(err);
        }
    });

    midiUpload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        statusDiv.textContent = 'MIDIを読み込んでいます...';
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                midiData = new Midi(e.target.result);
                statusDiv.textContent = 'MIDIの読み込みが完了しました。';
                checkReady();
            } catch (err) {
                statusDiv.textContent = 'MIDIの解析に失敗しました。';
                console.error(err);
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function checkReady() {
        previewBtn.disabled = !originalAudioBuffer;
        generateBtn.disabled = !(originalAudioBuffer && midiData);
    }

    function getSlicedBuffer() {
        const start = parseFloat(trimStart.value);
        let end = parseFloat(trimEnd.value);
        if (start >= end) end = start + 0.1;
        return originalAudioBuffer.slice(start, end);
    }

    previewBtn.addEventListener('click', async () => {
        await Tone.start();
        if (previewPlayer) {
            previewPlayer.stop();
            previewPlayer.dispose();
        }
        const sliced = getSlicedBuffer();
        previewPlayer = new Tone.Player(sliced).toDestination();
        previewPlayer.start();
    });

    generateBtn.addEventListener('click', async () => {
        statusDiv.textContent = '生成中... 処理に数秒かかります。';
        generateBtn.disabled = true;
        downloadArea.style.display = 'none';

        try {
            let maxDuration = 0;
            let noteCount = 0;
            midiData.tracks.forEach(track => {
                track.notes.forEach(note => {
                    noteCount++;
                    const noteEnd = note.time + note.duration;
                    if (noteEnd > maxDuration) maxDuration = noteEnd;
                });
            });

            if (noteCount === 0) {
                throw new Error("MIDIファイルに音符が含まれていません。");
            }

            const renderDuration = maxDuration + 2.0; 
            const baseNote = baseNoteSelect.value;
            const pitchShift = parseInt(pitchShiftInput.value) || 0;
            const slicedBuffer = getSlicedBuffer();

            const tempWavArrayBuffer = audioBufferToWav(slicedBuffer);
            const tempBlob = new Blob([new DataView(tempWavArrayBuffer)], { type: 'audio/wav' });
            const tempWavUrl = URL.createObjectURL(tempBlob);

            const renderedBuffer = await Tone.Offline(async () => {
                const comp = new Tone.Compressor(-15, 4).toDestination();
                
                const sampler = new Tone.Sampler({
                    urls: {
                        [baseNote]: tempWavUrl
                    },
                    attack: 0.01,
                    release: 0.05
                }).connect(comp);

                await Tone.loaded();

                midiData.tracks.forEach(track => {
                    track.notes.forEach(note => {
                        // MIDIのノート番号にピッチシフトの値を足す
                        let shiftedMidi = note.midi + pitchShift;
                        
                        // MIDI規格の範囲内に収める (0〜127)
                        if (shiftedMidi < 0) shiftedMidi = 0;
                        if (shiftedMidi > 127) shiftedMidi = 127;
                        
                        // シフトしたノート番号を "C4" などの音階名に変換
                        const shiftedNoteName = Tone.Frequency(shiftedMidi, "midi").toNote();

                        sampler.triggerAttackRelease(
                            shiftedNoteName, 
                            note.duration, 
                            note.time || 0, 
                            note.velocity
                        );
                    });
                });
            }, renderDuration);
            
            URL.revokeObjectURL(tempWavUrl);

            const finalWavData = audioBufferToWav(renderedBuffer);
            const blob = new Blob([new DataView(finalWavData)], { type: 'audio/wav' });
            const finalUrl = URL.createObjectURL(blob);
            
            downloadLink.href = finalUrl;
            downloadArea.style.display = 'block';
            statusDiv.textContent = '生成が完了しました。下のボタンから保存してください。';

        } catch (err) {
            statusDiv.textContent = '生成中にエラーが発生しました: ' + err.message;
            console.error(err);
        } finally {
            generateBtn.disabled = false;
        }
    });

    function audioBufferToWav(toneBuffer) {
        const buffer = toneBuffer.get ? toneBuffer.get() : toneBuffer;
        const numChannels = buffer.numberOfChannels;
        const sampleRate = buffer.sampleRate;
        const format = 1; 
        const bitDepth = 16;
        
        const result = new Float32Array(buffer.length * numChannels);
        for (let channel = 0; channel < numChannels; channel++) {
            const channelData = buffer.getChannelData(channel);
            for (let i = 0; i < buffer.length; i++) {
                result[i * numChannels + channel] = channelData[i];
            }
        }

        const dataLength = result.length * (bitDepth / 8);
        const bufferLength = 44 + dataLength;
        const arrayBuffer = new ArrayBuffer(bufferLength);
        const view = new DataView(arrayBuffer);

        const writeString = (view, offset, string) => {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        };

        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + dataLength, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, format, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
        view.setUint16(32, numChannels * (bitDepth / 8), true);
        view.setUint16(34, bitDepth, true);
        writeString(view, 36, 'data');
        view.setUint32(40, dataLength, true);

        let offset = 44;
        for (let i = 0; i < result.length; i++) {
            const sample = Math.max(-1, Math.min(1, result[i]));
            view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
            offset += 2;
        }

        return arrayBuffer;
    }
</script>

</body>
</html>
