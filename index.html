<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音MADジェネレーター (プレビュー機能付き)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tonejs/midi"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid #007acc;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .section {
            margin-bottom: 25px;
            padding: 15px;
            background-color: #3d3d3d;
            border-radius: 6px;
        }
        .section h2 {
            margin-top: 0;
            font-size: 1.2em;
            color: #4daafc;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        input[type="file"] {
            display: block;
            margin-bottom: 10px;
            width: 100%;
        }
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }
        .input-group div {
            flex: 1;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #555;
            border-radius: 4px;
            background-color: #1e1e1e;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            transition: background-color 0.2s;
            margin-bottom: 10px;
        }
        button:hover {
            background-color: #005f9e;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .preview-btn {
            background-color: #28a745;
        }
        .preview-btn:hover {
            background-color: #218838;
        }
        .stop-btn {
            background-color: #dc3545;
        }
        .stop-btn:hover {
            background-color: #c82333;
        }
        #status {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: #ffcc00;
            word-break: break-all;
        }
        #resultArea {
            margin-top: 20px;
            padding: 15px;
            background-color: #2a2a2a;
            border: 1px solid #4daafc;
            border-radius: 6px;
            display: none;
        }
        #resultArea h2 {
            margin-top: 0;
            font-size: 1.1em;
            color: #4daafc;
            text-align: center;
        }
        #downloadLink {
            display: block;
            text-align: center;
            background-color: #e51400;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 10px;
        }
        #downloadLink:hover {
            background-color: #b30f00;
        }
        .note {
            font-size: 0.8em;
            color: #bbb;
            margin-top: 5px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>音MADジェネレーター</h1>

    <div class="section">
        <h2>1. 音声のアップロードと切り抜き</h2>
        <label>素材となる音声ファイル (MP3 / WAV)</label>
        <input type="file" id="audioUpload" accept="audio/mp3, audio/wav, audio/mpeg">
        
        <div class="input-group">
            <div>
                <label>開始時間 (秒)</label>
                <input type="number" id="trimStart" value="0" min="0" step="0.01">
            </div>
            <div>
                <label>終了時間 (秒)</label>
                <input type="number" id="trimEnd" value="1" min="0.01" step="0.01">
            </div>
        </div>
        <div class="note">元の音の高さは「C4 (ド)」として扱われます。</div>
        <button class="preview-btn" id="previewBtn" disabled>切り抜いた音声をプレビュー</button>
    </div>

    <div class="section">
        <h2>2. MIDIのアップロード</h2>
        <label>メロディとなるMIDIファイル</label>
        <input type="file" id="midiUpload" accept=".mid, .midi">
    </div>

    <div class="section">
        <h2>3. エフェクトの設定</h2>
        <label>激しいエフェクトを開始する時間 (秒)</label>
        <input type="number" id="effectStart" value="16.0" min="0" step="0.1">
        <div class="note">生成される楽曲の中で、この時間以降から音圧や歪みが強くなります。</div>
    </div>

    <div class="section">
        <h2>4. 音声の生成</h2>
        <button id="generateBtn" disabled>MIDIに合わせて音声を生成する</button>
        <div id="status"></div>
    </div>

    <div id="resultArea">
        <h2>生成結果</h2>
        <div class="input-group">
            <button class="preview-btn" id="playResultBtn">生成した音声をプレビュー</button>
            <button class="stop-btn" id="stopResultBtn" disabled>停止</button>
        </div>
        <a id="downloadLink" href="#" download="otomad_output.wav">WAV形式でダウンロード</a>
    </div>
</div>

<script>
    let originalAudioBuffer = null;
    let midiData = null;
    let finalRenderedBuffer = null;
    let finalPlayer = null;

    const audioUpload = document.getElementById('audioUpload');
    const midiUpload = document.getElementById('midiUpload');
    const trimStart = document.getElementById('trimStart');
    const trimEnd = document.getElementById('trimEnd');
    const effectStartInput = document.getElementById('effectStart');
    const previewBtn = document.getElementById('previewBtn');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');
    
    // 結果エリア用
    const resultArea = document.getElementById('resultArea');
    const playResultBtn = document.getElementById('playResultBtn');
    const stopResultBtn = document.getElementById('stopResultBtn');
    const downloadLink = document.getElementById('downloadLink');

    audioUpload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        statusDiv.textContent = '音声を読み込んでいます...';
        const arrayBuffer = await file.arrayBuffer();
        const audioContext = Tone.getContext().rawContext;
        
        try {
            const decodedBuffer = await audioContext.decodeAudioData(arrayBuffer);
            originalAudioBuffer = new Tone.ToneAudioBuffer(decodedBuffer);
            trimEnd.value = originalAudioBuffer.duration.toFixed(2);
            statusDiv.textContent = '音声の読み込みが完了しました。';
            checkReady();
        } catch (err) {
            statusDiv.textContent = '音声の読み込みに失敗しました。';
            console.error(err);
        }
    });

    midiUpload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        statusDiv.textContent = 'MIDIを読み込んでいます...';
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                midiData = new Midi(e.target.result);
                statusDiv.textContent = 'MIDIの読み込みが完了しました。';
                checkReady();
            } catch (err) {
                statusDiv.textContent = 'MIDIの解析に失敗しました。';
                console.error(err);
            }
        };
        reader.readAsArrayBuffer(file);
    });

    function checkReady() {
        previewBtn.disabled = !originalAudioBuffer;
        generateBtn.disabled = !(originalAudioBuffer && midiData);
    }

    function getSlicedBuffer() {
        const start = parseFloat(trimStart.value);
        let end = parseFloat(trimEnd.value);
        if (start >= end) end = start + 0.1;
        return originalAudioBuffer.slice(start, end);
    }

    // 元音声のプレビュー
    previewBtn.addEventListener('click', async () => {
        await Tone.start();
        const sliced = getSlicedBuffer();
        const player = new Tone.Player(sliced).toDestination();
        player.start();
    });

    // 生成処理
    generateBtn.addEventListener('click', async () => {
        statusDiv.textContent = '生成中... しばらくお待ちください。';
        generateBtn.disabled = true;
        resultArea.style.display = 'none';

        try {
            let maxDuration = 0;
            let noteCount = 0;
            midiData.tracks.forEach(track => {
                track.notes.forEach(note => {
                    noteCount++;
                    const noteEnd = note.time + note.duration;
                    if (noteEnd > maxDuration) maxDuration = noteEnd;
                });
            });

            if (noteCount === 0) {
                throw new Error("MIDIファイルに音符（ノート）が含まれていません。");
            }

            const renderDuration = maxDuration + 2.0; 
            const slicedBuffer = getSlicedBuffer();
            const effectStart = parseFloat(effectStartInput.value);

            // async を追加し、内部でロードを待機できるようにする
            finalRenderedBuffer = await Tone.Offline(async () => {
                const dryGain = new Tone.Gain(1).toDestination();
                const wetGain = new Tone.Gain(0);
                
                const dist = new Tone.Distortion(0.6);
                const eq = new Tone.EQ3({ low: 8, mid: 0, high: 5 });
                const reverb = new Tone.Reverb(2.5);
                
                wetGain.chain(eq, dist, reverb, Tone.Destination);

                const sampler = new Tone.Sampler({
                    urls: {
                        "C4": slicedBuffer
                    }
                });
                sampler.connect(dryGain);
                sampler.connect(wetGain);

                // サンプラーに音声が完全に読み込まれるまで待機する（エラー防止）
                await Tone.loaded();

                dryGain.gain.setValueAtTime(1, 0);
                dryGain.gain.setValueAtTime(0, effectStart);
                
                wetGain.gain.setValueAtTime(0, 0);
                wetGain.gain.setValueAtTime(1, effectStart);

                midiData.tracks.forEach(track => {
                    track.notes.forEach(note => {
                        sampler.triggerAttackRelease(
                            note.name, 
                            note.duration, 
                            note.time || 0, 
                            note.velocity
                        );
                    });
                });
            }, renderDuration);
            
            // WAV変換とダウンロードリンク作成
            const wavData = audioBufferToWav(finalRenderedBuffer);
            const blob = new Blob([new DataView(wavData)], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            
            downloadLink.href = url;
            resultArea.style.display = 'block';
            statusDiv.textContent = '生成が完了しました！下部のボタンからプレビューやダウンロードが可能です。';

        } catch (err) {
            statusDiv.textContent = '生成中にエラーが発生しました: ' + err.message;
            console.error(err);
        } finally {
            generateBtn.disabled = false;
        }
    });

    // 生成結果のプレビュー再生
    playResultBtn.addEventListener('click', async () => {
        if (!finalRenderedBuffer) return;
        await Tone.start();

        if (finalPlayer) {
            finalPlayer.stop();
            finalPlayer.dispose();
        }

        finalPlayer = new Tone.Player(finalRenderedBuffer).toDestination();
        finalPlayer.start();
        
        playResultBtn.disabled = true;
        stopResultBtn.disabled = false;

        finalPlayer.onstop = () => {
            playResultBtn.disabled = false;
            stopResultBtn.disabled = true;
        };
    });

    // 生成結果のプレビュー停止
    stopResultBtn.addEventListener('click', () => {
        if (finalPlayer) {
            finalPlayer.stop();
        }
        playResultBtn.disabled = false;
        stopResultBtn.disabled = true;
    });

    function audioBufferToWav(toneBuffer) {
        const buffer = toneBuffer.get ? toneBuffer.get() : toneBuffer;
        const numChannels = buffer.numberOfChannels;
        const sampleRate = buffer.sampleRate;
        const format = 1; 
        const bitDepth = 16;
        
        const result = new Float32Array(buffer.length * numChannels);
        for (let channel = 0; channel < numChannels; channel++) {
            const channelData = buffer.getChannelData(channel);
            for (let i = 0; i < buffer.length; i++) {
                result[i * numChannels + channel] = channelData[i];
            }
        }

        const dataLength = result.length * (bitDepth / 8);
        const bufferLength = 44 + dataLength;
        const arrayBuffer = new ArrayBuffer(bufferLength);
        const view = new DataView(arrayBuffer);

        const writeString = (view, offset, string) => {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        };

        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + dataLength, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, format, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
        view.setUint16(32, numChannels * (bitDepth / 8), true);
        view.setUint16(34, bitDepth, true);
        writeString(view, 36, 'data');
        view.setUint32(40, dataLength, true);

        let offset = 44;
        for (let i = 0; i < result.length; i++) {
            const sample = Math.max(-1, Math.min(1, result[i]));
            view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
            offset += 2;
        }

        return arrayBuffer;
    }
</script>

</body>
</html>
