<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音MAD 音声エフェクト追加ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e1e;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            text-align: center;
            border-bottom: 2px solid #007acc;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .section {
            margin-bottom: 25px;
            padding: 15px;
            background-color: #3d3d3d;
            border-radius: 6px;
        }
        .section h2 {
            margin-top: 0;
            font-size: 1.2em;
            color: #4daafc;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        input[type="file"] {
            display: block;
            margin-bottom: 15px;
            width: 100%;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #555;
            border-radius: 4px;
            background-color: #1e1e1e;
            color: #fff;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            margin-bottom: 10px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #005f9e;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .preview-btn {
            background-color: #28a745;
        }
        .preview-btn:hover {
            background-color: #218838;
        }
        .stop-btn {
            background-color: #dc3545;
        }
        .stop-btn:hover {
            background-color: #c82333;
        }
        #status {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: #ffcc00;
            word-break: break-all;
        }
        #downloadArea {
            margin-top: 20px;
            display: none;
        }
        #downloadArea a {
            display: block;
            text-align: center;
            background-color: #e51400;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
        }
        #downloadArea a:hover {
            background-color: #b30f00;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>盛り上がりエフェクト追加ツール</h1>

    <div class="section">
        <h2>1. 音声の読み込み</h2>
        <label>素材となる音声ファイル (MP3 / WAV)</label>
        <input type="file" id="audioUpload" accept="audio/mp3, audio/wav, audio/mpeg">
    </div>

    <div class="section">
        <h2>2. エフェクトの設定</h2>
        <label>エフェクトを開始する時間 (秒)</label>
        <input type="number" id="effectStart" value="16.0" min="0" step="0.1">
        <p style="font-size: 0.8em; color: #bbb;">※指定した時間から、ディストーションや低音強調などの激しいエフェクトがかかります。</p>
        
        <button class="preview-btn" id="previewBtn" disabled>プレビュー再生</button>
        <button class="stop-btn" id="stopBtn" disabled>停止</button>
    </div>

    <div class="section">
        <h2>3. エフェクト付き音声の生成</h2>
        <button id="generateBtn" disabled>WAV形式で書き出す</button>
        <div id="status"></div>
    </div>

    <div id="downloadArea">
        <a id="downloadLink" href="#" download="effect_output.wav">エフェクト付きWAVをダウンロード</a>
    </div>
</div>

<script>
    let audioBuffer = null;
    let previewPlayer = null;
    let isPlaying = false;

    const audioUpload = document.getElementById('audioUpload');
    const effectStartInput = document.getElementById('effectStart');
    const previewBtn = document.getElementById('previewBtn');
    const stopBtn = document.getElementById('stopBtn');
    const generateBtn = document.getElementById('generateBtn');
    const statusDiv = document.getElementById('status');
    const downloadArea = document.getElementById('downloadArea');
    const downloadLink = document.getElementById('downloadLink');

    // 音声ファイルの読み込み
    audioUpload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        statusDiv.textContent = '音声を読み込んでいます...';
        const arrayBuffer = await file.arrayBuffer();
        const audioContext = Tone.getContext().rawContext;
        
        try {
            const decodedBuffer = await audioContext.decodeAudioData(arrayBuffer);
            audioBuffer = new Tone.ToneAudioBuffer(decodedBuffer);
            statusDiv.textContent = '音声の読み込みが完了しました。';
            
            previewBtn.disabled = false;
            generateBtn.disabled = false;
        } catch (err) {
            statusDiv.textContent = '音声の読み込みに失敗しました。';
            console.error(err);
        }
    });

    // プレビュー再生
    previewBtn.addEventListener('click', async () => {
        if (!audioBuffer) return;
        
        await Tone.start();
        stopPreview();

        const effectStart = parseFloat(effectStartInput.value);

        // プレビュー用のノード構築
        previewPlayer = new Tone.Player(audioBuffer);
        
        const dryGain = new Tone.Gain(1).toDestination();
        const wetGain = new Tone.Gain(0);
        
        // 盛り上がり用のエフェクトチェーン
        const dist = new Tone.Distortion(0.6); // 歪み
        const eq = new Tone.EQ3({ low: 8, mid: 0, high: 5 }); // ドンシャリ
        const reverb = new Tone.Reverb(2.5); // 残響
        
        wetGain.chain(eq, dist, reverb, Tone.Destination);
        
        previewPlayer.connect(dryGain);
        previewPlayer.connect(wetGain);

        // 指定時間でDry（原音）からWet（エフェクト音）に切り替える
        const startTime = Tone.now();
        dryGain.gain.setValueAtTime(1, startTime);
        dryGain.gain.setValueAtTime(0, startTime + effectStart);
        
        wetGain.gain.setValueAtTime(0, startTime);
        wetGain.gain.setValueAtTime(1, startTime + effectStart);

        previewPlayer.start();
        isPlaying = true;
        stopBtn.disabled = false;
        previewBtn.disabled = true;

        previewPlayer.onstop = () => {
            stopPreview();
        };
    });

    // プレビュー停止
    stopBtn.addEventListener('click', stopPreview);

    function stopPreview() {
        if (previewPlayer && isPlaying) {
            previewPlayer.stop();
            previewPlayer.dispose();
            isPlaying = false;
        }
        stopBtn.disabled = true;
        previewBtn.disabled = false;
    }

    // オフラインレンダリング（WAV書き出し）
    generateBtn.addEventListener('click', async () => {
        if (!audioBuffer) return;

        stopPreview();
        statusDiv.textContent = '生成中... しばらくお待ちください。';
        generateBtn.disabled = true;
        downloadArea.style.display = 'none';

        const effectStart = parseFloat(effectStartInput.value);
        const duration = audioBuffer.duration;

        try {
            const renderedBuffer = await Tone.Offline(({ transport }) => {
                const player = new Tone.Player(audioBuffer).sync().start(0);
                
                const dryGain = new Tone.Gain(1).toDestination();
                const wetGain = new Tone.Gain(0);
                
                const dist = new Tone.Distortion(0.6);
                const eq = new Tone.EQ3({ low: 8, mid: 0, high: 5 });
                const reverb = new Tone.Reverb(2.5);
                
                wetGain.chain(eq, dist, reverb, Tone.Destination);
                
                player.connect(dryGain);
                player.connect(wetGain);

                // 時間制御によるルーティング切り替え
                dryGain.gain.setValueAtTime(1, 0);
                dryGain.gain.setValueAtTime(0, effectStart);
                
                wetGain.gain.setValueAtTime(0, 0);
                wetGain.gain.setValueAtTime(1, effectStart);

                transport.start();
            }, duration);
            
            const wavData = audioBufferToWav(renderedBuffer);
            const blob = new Blob([new DataView(wavData)], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            
            downloadLink.href = url;
            downloadArea.style.display = 'block';
            statusDiv.textContent = 'エフェクト付き音声の生成が完了しました。';

        } catch (err) {
            statusDiv.textContent = '生成中にエラーが発生しました: ' + err.message;
            console.error(err);
        } finally {
            generateBtn.disabled = false;
        }
    });

    // AudioBuffer -> WAV変換
    function audioBufferToWav(toneBuffer) {
        const buffer = toneBuffer.get ? toneBuffer.get() : toneBuffer;
        const numChannels = buffer.numberOfChannels;
        const sampleRate = buffer.sampleRate;
        const format = 1; 
        const bitDepth = 16;
        
        const result = new Float32Array(buffer.length * numChannels);
        for (let channel = 0; channel < numChannels; channel++) {
            const channelData = buffer.getChannelData(channel);
            for (let i = 0; i < buffer.length; i++) {
                result[i * numChannels + channel] = channelData[i];
            }
        }

        const dataLength = result.length * (bitDepth / 8);
        const bufferLength = 44 + dataLength;
        const arrayBuffer = new ArrayBuffer(bufferLength);
        const view = new DataView(arrayBuffer);

        const writeString = (view, offset, string) => {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        };

        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + dataLength, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, format, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * numChannels * (bitDepth / 8), true);
        view.setUint16(32, numChannels * (bitDepth / 8), true);
        view.setUint16(34, bitDepth, true);
        writeString(view, 36, 'data');
        view.setUint32(40, dataLength, true);

        let offset = 44;
        for (let i = 0; i < result.length; i++) {
            const sample = Math.max(-1, Math.min(1, result[i]));
            view.setInt16(offset, sample < 0 ? sample * 0x8000 : sample * 0x7FFF, true);
            offset += 2;
        }

        return arrayBuffer;
    }
</script>

</body>
</html>
